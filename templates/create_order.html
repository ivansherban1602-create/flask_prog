<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include '_navigation.html' %}
    {%if basket%}
        <ul>
            {%for position in basket.values()%}
                <li>{{position['name']}} , к-сть: {{position['count']}}</li>
            {%endfor%}
        </ul>
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="submit" value="Оформити замволення">

        </form>
    {%else%}
        <h1>Ваш список замовлень пустий</h1>
    {%endif%}
</body>
</html>
